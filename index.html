<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>儿童启蒙乐园</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:"Nunito","Comic Sans MS",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;background:linear-gradient(135deg,#fff5f5 0%,#fffbe6 30%,#f0fff4 60%,#e6f7ff 100%);min-height:100vh;color:#445}
#app{max-width:900px;margin:0 auto;padding:14px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-radius:20px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:14px;position:sticky;top:8px;z-index:50;border:1px solid rgba(255,255,255,.8)}
.topbar h1{font-size:22px;margin:0;background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;letter-spacing:0px;text-shadow:none}
.topbar .btns{display:flex;gap:8px;align-items:center}
.btn{font-size:13px;padding:8px 14px;border-radius:24px;border:none;background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);color:#b35a2b;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:800;box-shadow:0 3px 8px rgba(252,182,159,.4);transition:transform .15s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.95);opacity:.9}
.homeBtn{display:none;font-size:13px;padding:8px 14px;border-radius:24px;border:none;background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%);color:#a8324e;cursor:pointer;font-weight:800;box-shadow:0 3px 8px rgba(255,154,158,.35);transition:transform .15s}
.homeBtn:hover{transform:translateY(-2px)}
.statBox{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.statCard{border-radius:20px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.08);border:2px solid rgba(255,255,255,.7);transition:transform .2s}
.statCard:nth-child(1){background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);color:#2a5d5a}
.statCard:nth-child(2){background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);color:#8b4a26}
.statCard:nth-child(3){background:linear-gradient(135deg,#d299c2 0%,#fef9d7 100%);color:#5a2d52}
.statCard:nth-child(4){background:linear-gradient(135deg,#89f7fe 0%,#66a6ff 100%);color:#1a3c6e}
.statCard b{display:block;font-size:24px;margin-bottom:2px;font-weight:900}
.statCard span{font-size:11px;font-weight:800;opacity:.9}
.statCard:active{transform:scale(.96)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.card{border-radius:24px;padding:18px 12px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 24px rgba(0,0,0,.08);border:2px solid rgba(255,255,255,.7);position:relative;overflow:hidden;background:#fff}
.card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.7) 0%,rgba(255,255,255,0) 50%);pointer-events:none}
.card:nth-child(1){background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%)}
.card:nth-child(2){background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%)}
.card:nth-child(3){background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%)}
.card:nth-child(4){background:linear-gradient(135deg,#d299c2 0%,#fef9d7 100%)}
.card:nth-child(5){background:linear-gradient(135deg,#89f7fe 0%,#66a6ff 100%)}
.card:nth-child(6){background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.card:nth-child(7){background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}
.card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 30px rgba(0,0,0,.12)}
.card:active{transform:scale(.97)}
.card .emoji{font-size:56px;line-height:1.1;margin-bottom:8px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.15));display:block;animation:float 3s ease-in-out infinite}
.card .title{font-size:16px;font-weight:900;color:#2a2a3a;margin-bottom:4px;position:relative;z-index:1}
.card .sub{font-size:12px;color:#556;position:relative;z-index:1;font-weight:700}
.stageCards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:12px}
.stageCard{background:linear-gradient(135deg,#fff 0%,#f8f9ff 100%);border-radius:22px;padding:20px 14px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.08);cursor:pointer;border:2px solid rgba(255,255,255,.7);transition:transform .2s,box-shadow .2s;background:#fff}
.stageCard:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.1)}
.stageCard:active{transform:scale(.95)}
.stageCard .emoji{font-size:56px;margin-bottom:6px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));display:block;animation:float 3s ease-in-out infinite}
.stageCard .title{font-size:16px;font-weight:900;color:#334}
.pageTitle{font-size:24px;font-weight:900;margin:14px 0 16px;text-align:center;background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.tabs{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 20px;background:rgba(255,255,255,.85);border-radius:30px;border:2px solid rgba(0,0,0,.06);font-size:14px;color:#556;cursor:pointer;white-space:nowrap;font-weight:800;box-shadow:0 3px 8px rgba(0,0,0,.06);transition:all .2s}
.tab.on{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(102,126,234,.4);transform:scale(1.05)}
.tab:hover:not(.on){background:#fff;transform:translateY(-2px)}
.listItem{background:rgba(255,255,255,.95);border-radius:20px;padding:16px 18px;margin-bottom:12px;box-shadow:0 6px 18px rgba(0,0,0,.06);cursor:pointer;border-left:6px solid transparent;transition:transform .15s,box-shadow .15s;border:2px solid rgba(255,255,255,.7)}
.listItem:nth-child(4n+1){border-left-color:#ff6b6b}
.listItem:nth-child(4n+2){border-left-color:#48dbfb}
.listItem:nth-child(4n+3){border-left-color:#feca57}
.listItem:nth-child(4n+4){border-left-color:#ff9ff3}
.listItem:hover{transform:translateX(4px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.listItem:active{transform:scale(.99)}
.listItem .line1{display:flex;align-items:center;justify-content:space-between;gap:8px}
.listItem .name{font-size:16px;font-weight:900;color:#2a2a3a}
.listItem .emoji{font-size:32px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.listItem .desc{font-size:14px;color:#567;margin-top:8px;line-height:1.7;font-weight:600}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal.active{display:flex}
.modalBox{background:rgba(255,255,255,.98);border-radius:28px 28px 0 0;width:100%;max-width:640px;max-height:85vh;overflow:auto;padding:24px 20px 32px;animation:slideUp .3s ease-out;box-shadow:0 -10px 40px rgba(0,0,0,.15);border-top:3px solid rgba(255,255,255,.8)}
@keyframes slideUp{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
@keyframes popIn{0%{transform:scale(0) rotate(-45deg)}80%{transform:scale(1.1) rotate(5deg)}100%{transform:scale(1) rotate(0deg)}}
.modalTitle{font-size:20px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;color:#333}
.modalClose{background:linear-gradient(135deg,#f1f5f9 0%,#e2e8f0 100%);border:none;border-radius:14px;width:40px;height:40px;font-size:18px;cursor:pointer;color:#445;box-shadow:0 2px 6px rgba(0,0,0,.1);font-weight:900}
.qaBox{background:linear-gradient(135deg,#f0f7ff 0%,#fff0f5 100%);border-radius:20px;padding:18px;margin:14px 0;text-align:center;font-size:18px;box-shadow:inset 0 3px 10px rgba(0,0,0,.04);border:2px dashed #c7d2fe}
.qaBox .q{font-size:26px;font-weight:900;margin-bottom:16px;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.ansGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.ansBtn{background:#fff;border:3px solid #e2e8f0;border-radius:18px;padding:16px 10px;text-align:center;cursor:pointer;font-size:22px;min-height:60px;font-weight:900;color:#334;box-shadow:0 4px 12px rgba(0,0,0,.08);transition:all .15s}
.ansBtn:hover{transform:translateY(-3px);border-color:#cbd5e1;box-shadow:0 6px 16px rgba(0,0,0,.1)}
.ansBtn.right{border-color:#1dd1a1;background:linear-gradient(135deg,#e6fff6 0%,#d0fcee 100%);color:#0d7a5a;transform:scale(1.08);box-shadow:0 6px 20px rgba(29,209,161,.25)}
.ansBtn.wrong{border-color:#ff6b6b;background:linear-gradient(135deg,#fff0f0 0%,#ffe0e0 100%);color:#a83232;animation:shake .4s ease-in-out}
.progBar{height:14px;background:#eaf2ff;border-radius:10px;overflow:hidden;margin:12px 0;box-shadow:inset 0 2px 5px rgba(0,0,0,.08)}
.progBar i{display:block;height:100%;background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);border-radius:10px;transition:width .4s;box-shadow:0 0 12px rgba(102,126,234,.3)}
.planRow{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:13px;color:#567;font-weight:700}
.planRow input{width:72px;padding:10px;border-radius:12px;border:2px solid #ddd;font-size:14px;background:rgba(255,255,255,.9);font-weight:800;text-align:center}
.progressRow{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;color:#567;font-weight:700}
.groupTitle{font-size:15px;font-weight:900;color:#445;margin:18px 0 10px;padding-left:12px;border-left:6px solid #ff6b6b;letter-spacing:.5px}
.empty{text-align:center;color:#789;padding:40px 0;font-size:15px;font-weight:700}
.celebrate{position:fixed;inset:0;z-index:200;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.celebrate .big{font-size:100px;animation:popIn .6s cubic-bezier(.175,.885,.32,1.275);filter:drop-shadow(0 6px 20px rgba(0,0,0,.2))}
.celebrate .text{font-size:22px;font-weight:900;margin-top:12px;color:#ff6b6b;text-shadow:0 2px 8px rgba(0,0,0,.15);animation:bounceIn .5s}
.numGrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.numChip{width:64px;height:72px;border-radius:16px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:22px;font-weight:900;color:#2a6edb;cursor:pointer;border:2px solid rgba(255,255,255,.8);transition:transform .15s}
.numChip:hover{transform:translateY(-4px) scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.numChip .emoji{font-size:24px}
.numChip .num{font-size:14px;color:#667}
.charGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px}
.charCard{background:#fff;border-radius:20px;padding:14px 6px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.08);border:2px solid rgba(255,255,255,.7);transition:transform .2s}
.charCard:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 10px 28px rgba(0,0,0,.12)}
.charCard:active{transform:scale(.95)}
.charCard .char{font-size:42px;font-weight:900;color:#2a2a3a;margin-bottom:4px}
.charCard .pinyin{font-size:13px;color:#667;font-weight:700;margin-bottom:2px}
.charCard .emoji{font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.pageNav{display:flex;justify-content:center;align-items:center;gap:10px;margin:18px 0}
.pageBtn{padding:8px 16px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(102,126,234,.3);transition:transform .15s}
.pageBtn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none}
.pageBtn:hover:not(:disabled){transform:translateY(-2px)}
.pageInfo{font-size:13px;color:#667;font-weight:800}
@media (max-width:640px){
  #app{padding:10px}
  .topbar{top:0;border-radius:0 0 20px 20px;margin:-10px -10px 12px;padding:10px 14px}
  .topbar h1{font-size:18px}
  .btn,.homeBtn{padding:7px 12px;font-size:12px;border-radius:20px}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .card{padding:14px 8px;border-radius:22px}
  .card .emoji{font-size:48px}
  .card .title{font-size:14px}
  .stageCards{grid-template-columns:repeat(2,1fr);gap:10px}
  .statCard b{font-size:20px}
  .statCard{padding:10px 6px;border-radius:18px}
  .ansGrid{gap:10px}
  .ansBtn{padding:14px 8px;font-size:20px;min-height:56px;border-radius:16px}
  .modalBox{max-height:88vh;padding:20px 16px 28px;border-radius:26px 26px 0 0}
  .listItem{padding:14px 16px;border-radius:18px}
  .tabs{gap:8px}
  .tab{padding:8px 16px;font-size:13px}
  .charGrid{grid-template-columns:repeat(3,1fr);gap:10px}
  .charCard .char{font-size:36px}
  .numChip{width:52px;height:60px;font-size:18px;border-radius:14px}
  .qaBox .q{font-size:22px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="quizModal" class="modal" onclick="if(event.target===this)closeMathQuiz()"><div class="modalBox" id="quizBox"></div></div>
<div id="historyModal" class="modal" onclick="if(event.target===this)closeHistory()"><div class="modalBox" id="historyBox"></div></div>
<script>
const EMOJI_MAP={'🦢':'天鹅','🌙':'月亮','🛏':'床','❄':'雪花','🦅':'鹰','⛰':'山','❤':'爱心','🦌':'鹿','🌿':'草木','🪷':'莲花','⭐':'星星','🐯':'老虎','🦆':'鸭子','🐦':'燕子','🥕':'萝卜','🐇':'兔子','📰':'报纸','👩':'妈妈','🐢':'乌龟','🦊':'狐狸','🍇':'葡萄','🐺':'狼','💧':'水','🪣':'水桶','🐸':'青蛙','🌾':'禾苗','🦗':'蟋蟀','🐰':'兔子','🦚':'孔雀','🍐':'梨','🪨':'石头','⚖':'秤','🪡':'针','🐓':'公鸡','🔔':'铃铛','🍎':'苹果','🐍':'蛇','🐘':'大象','🦁':'狮子','🌹':'玫瑰','🌻':'向日葵','🌵':'仙人掌','🍁':'枫叶','🌍':'地球','🏔':'山峰','🏰':'城堡','🗼':'铁塔','🗽':'自由女神','🌊':'海洋','🏯':'故宫','🧱':'长城','🗿':'兵马俑','🏠':'房子','🍜':'面条','🥟':'饺子','🧧':'红包','🎏':'风筝','🎆':'烟花','👑':'国王','⚔':'宝剑','🐎':'马','📖':'书本','🖌':'毛笔','📜':'卷轴','🐉':'龙','☀':'太阳','🌕':'月亮','🪐':'土星','🚀':'火箭','🛸':'飞碟','🛰':'卫星','👨\u200d🚀':'宇航员','🌌':'银河','🔭':'望远镜','🧮':'算盘','➕':'加号','➖':'减号','✖':'乘号','➗':'除号','🔢':'数字','📐':'三角尺','📏':'尺子','🔴':'红球','🔵':'蓝球','🟢':'绿球','🟡':'黄球','🟠':'橙球','🟣':'紫球'};
function em2text(s){return s.replace(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,m=>EMOJI_MAP[m]||m);}
const synth=window.speechSynthesis;
let S={lang:'zh-CN',stage:'2',today:[],total:0,plan:20,records:[],subject:'',tab:'',page:0};
const I18N={zh:{homeTitle:'欢迎来到启蒙乐园',stage2:'2-4岁',stage4:'4-6岁',chinese:'语文王国',math:'数学王国',english:'英语王国',science:'百科王国',geo:'地理王国',history:'历史王国',space:'宇宙王国',changeStage:'切换阶段',changeLang:'English',backHome:'返回首页',totalLearn:'总学习数',todayLearn:'今日已学',dailyPlan:'每日计划',progress:'今日进度',setPlan:'设置目标',poems:'古诗',rhymes:'儿歌',fables:'寓言',stories:'故事',characters:'汉字',todayTag:'今日标签',letters:'字母',words:'单词',phrases:'短语',sentences:'句子',numbers:'数字',arithmetic:'算术',cognition:'趣味认知',continents:'大洲',countries:'国家',landmarks:'地标',china:'中国',animals:'动物',plants:'植物',common:'常识',solar:'太阳系',stars:'星星',galaxy:'星系',exploration:'探索',dynasties:'朝代',figures:'人物',events:'事件'},en:{homeTitle:'Welcome to Kids World',stage2:'Ages 2-4',stage4:'Ages 4-6',chinese:'Chinese',math:'Math Kingdom',english:'English',science:'Science',geo:'Geography',history:'History',space:'Space',changeStage:'Switch Stage',changeLang:'中文',backHome:'Home',totalLearn:'Total Learned',todayLearn:'Today Learned',dailyPlan:'Daily Goal',progress:'Progress',setPlan:'Set Goal',poems:'Poems',rhymes:'Rhymes',fables:'Fables',stories:'Stories',characters:'Characters',todayTag:'Today Tags',letters:'Letters',words:'Words',phrases:'Phrases',sentences:'Sentences',numbers:'Numbers',arithmetic:'Arithmetic',cognition:'Fun Cognition',continents:'Continents',countries:'Countries',landmarks:'Landmarks',china:'China',animals:'Animals',plants:'Plants',common:'Common Sense',solar:'Solar System',stars:'Stars',galaxy:'Galaxy',exploration:'Exploration',dynasties:'Dynasties',figures:'Figures',events:'Events'}};
function t(k){return I18N[S.lang==='en'?'en':'zh'][k]||k;}
function toggleLang(){S.lang=S.lang==='zh'?'en':'zh';save();renderHome();}
function save(){localStorage.setItem('kidsStats',JSON.stringify({today:S.today,total:S.total,plan:S.plan,records:S.records,date:new Date().toDateString()}));}
function load(){try{const d=JSON.parse(localStorage.getItem('kidsStats')||'{}');if(d.date===new Date().toDateString()){S.today=d.today||[];S.total=d.total||0;S.plan=d.plan||20;S.records=d.records||[];}else{S.today=[];S.total=d.total||0;S.plan=d.plan||20;S.records=d.records||[];}}catch(e){}}
function record(o){S.today.push({...o,t:new Date().toLocaleTimeString()});S.total++;S.records.unshift({...o,date:new Date().toLocaleString()});if(S.records.length>200)S.records.pop();save();updateStatsUI();}
function updateStatsUI(){const set=(id,v)=>{const el=document.getElementById(id);if(el)el.innerText=v;};const prog=Math.min(100,Math.round((S.today.length/S.plan)*100));set('stTotal',S.total);set('stToday',S.today.length);set('stPlan',S.plan);set('stProgText',prog+'%');const bar=document.getElementById('stProg');if(bar)bar.style.width=prog+'%';const tags=document.getElementById('stTags');if(tags){const subjects=[...new Set(S.today.map(x=>x.subject).filter(Boolean))];tags.innerText=subjects.join('、')||'-';}}
function speak(text){if(!synth)return;synth.cancel();const u=new SpeechSynthesisUtterance(em2text(text));u.lang='zh-CN';u.rate=0.85;u.pitch=1.18;synth.speak(u);}
function speakEn(text){if(!synth)return;synth.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.9;u.pitch=1.1;synth.speak(u);}
function speakBoth(zh,en){if(!synth)return;synth.cancel();const u1=new SpeechSynthesisUtterance(en);u1.lang='en-US';u1.rate=0.9;u1.pitch=1.1;const u2=new SpeechSynthesisUtterance(em2text(zh));u2.lang='zh-CN';u2.rate=0.85;u2.pitch=1.18;u1.onend=()=>synth.speak(u2);synth.speak(u1);}
function goStage(v){S.stage=v;save();renderHome();}
function goHome(){S.subject='';S.tab='';S.page=0;renderHome();}
function setPlanPrompt(){const v=prompt('设置每日计划数（1-100）',String(S.plan));if(v){const n=parseInt(v,10);if(n>0&&n<=100){S.plan=n;save();updateStatsUI();}}}
function showHistory(){const el=document.getElementById('historyModal');el.classList.add('active');document.getElementById('historyBox').innerHTML=historyHTML();}
function closeHistory(){document.getElementById('historyModal').classList.remove('active');}
function historyHTML(){const g={};S.records.forEach(r=>{const d=(r.date||'').split(' ')[0]||'今';g[d]=g[d]||[];g[d].push(r);});let h='<div class="modalTitle"><span>📖 学习记录</span><button class="modalClose" onclick="closeHistory()">✕</button></div>';const days=Object.keys(g).slice(0,14);if(!days.length)return h+'<div class="empty">暂无记录，快去开启学习之旅吧！🚀</div>';days.forEach(d=>{h+=`<div class="groupTitle">📅 ${d}</div>`;g[d].forEach(r=>{h+=`<div class="listItem"><div class="line1"><span class="name">${r.title||r.name||r.q||'学习'}</span><span style="font-size:12px;color:#678">${r.t||''}</span></div><div class="desc">🎒 ${r.tag||r.subject||''}</div></div>`;});});return h;}

/* ===== 数学引擎 ===== */
function seeded(s){let x=s||12345;return function(){x=(x*16807)%2147483647;return (x&0x7fffffff)/2147483647;};}
function mkFix(range,type,seedBase){const rng=seeded(seedBase);const out=[];for(let i=0;i<12;i++){let a,b,ans,op;const max=parseInt(range,10);if(type==='add'){a=Math.floor(rng()*(max-1))+1;b=Math.floor(rng()*(max-a))+1;ans=a+b;op='+';}else if(type==='sub'){a=Math.floor(rng()*(max-1))+2;b=Math.floor(rng()*(a-1))+1;ans=a-b;op='-';}else if(type==='mul'){const m=Math.min(max,10);a=Math.floor(rng()*m)+1;b=Math.floor(rng()*m)+1;ans=a*b;op='×';}else if(type==='div'){b=Math.floor(rng()*Math.min(max,9))+1;ans=Math.floor(rng()*Math.min(max,9))+1;a=b*ans;op='÷';}let opts=new Set([ans]);while(opts.size<4){let v=ans+Math.floor(rng()*max*2)-max;if(v>=0)opts.add(v);}opts=[...opts].sort(()=>rng()-0.5).slice(0,4);out.push({q:`${a} ${op} ${b} = ?`,ans:String(ans),opts:opts.map(String),tag:range+'_'+type});}return out;}
function mkRng(range,type){const out=[];for(let i=0;i<12;i++){let a,b,ans,op;const max=parseInt(range,10);if(type==='add'){a=Math.floor(Math.random()*(max-1))+1;b=Math.floor(Math.random()*(max-a))+1;ans=a+b;op='+';}else if(type==='sub'){a=Math.floor(Math.random()*(max-1))+2;b=Math.floor(Math.random()*(a-1))+1;ans=a-b;op='-';}else if(type==='mul'){const m=Math.min(max,10);a=Math.floor(Math.random()*m)+1;b=Math.floor(Math.random()*m)+1;ans=a*b;op='×';}else if(type==='div'){b=Math.floor(Math.random()*Math.min(max,9))+1;ans=Math.floor(Math.random()*Math.min(max,9))+1;a=b*ans;op='÷';}let opts=new Set([ans]);while(opts.size<4){let v=ans+Math.floor(Math.random()*max*2)-max;if(v>=0)opts.add(v);}opts=[...opts].sort(()=>Math.random()-0.5).slice(0,4);out.push({q:`${a} ${op} ${b} = ?`,ans:String(ans),opts:opts.map(String),tag:range+'_'+type});}return out;}
function buildMB(){const bank={};[10,20,100,200].forEach(r=>{['add','sub','mul','div'].forEach(t=>{const k=r+'_'+t;bank[k]=[].concat(mkFix(r,t,r*10+t.length),mkRng(r,t));bank[k].sort(()=>Math.random()-0.5);});});return bank;}

function renderScience(){let h=subjectTop(t('science'));const tabs=[['animals','动物'],['plants','植物'],['common','常识']];const active=S.tab||'animals';h+='<div class="tabs">'+tabs.map(([k,label])=>`<div class="tab ${active===k?'on':''}" onclick="S.tab='${k}';S.page=0;renderScience()">${t(k)||label}</div>`).join('')+'</div>';h+=`<div class="pageTitle">${t(active)}</div>`;const allList=DATA.science[active]||[];const list=S.stage==='2'?allList.slice(0,Math.min(4,allList.length)):allList;h+=paginate(list,(it)=>`<div class="listItem" onclick="speak('${it.name}，${it.desc}');record({subject:'百科',tag:'${active}',title:'${it.name||''}'})"><div class="line1"><span class="name">${it.name||''}</span><span class="emoji">${it.emoji}</span></div><div class="desc">${it.desc}</div></div>`,6,'renderScience');wrapPage(h);}
function renderGeo(){let h=subjectTop(t('geo'));const tabs=[['continents','大洲'],['countries','国家'],['landmarks','地标'],['china','中国']];const active=S.tab||'continents';h+='<div class="tabs">'+tabs.map(([k,label])=>`<div class="tab ${active===k?'on':''}" onclick="S.tab='${k}';S.page=0;renderGeo()">${t(k)||label}</div>`).join('')+'</div>';h+=`<div class="pageTitle">${t(active)}</div>`;const allList=DATA.geo[active]||[];const list=S.stage==='2'?allList.slice(0,Math.min(4,allList.length)):allList;h+=paginate(list,(it)=>`<div class="listItem" onclick="speak('${it.name}，${it.desc}');record({subject:'地理',tag:'${active}',title:'${it.name||''}'})"><div class="line1"><span class="name">${it.name||''}</span><span class="emoji">${it.emoji}</span></div><div class="desc">${it.desc}</div></div>`,6,'renderGeo');wrapPage(h);}
function renderHistory(){let h=subjectTop(t('history'));const tabs=[['dynasties','朝代'],['figures','人物'],['events','事件']];const active=S.tab||'dynasties';h+='<div class="tabs">'+tabs.map(([k,label])=>`<div class="tab ${active===k?'on':''}" onclick="S.tab='${k}';S.page=0;renderHistory()">${t(k)||label}</div>`).join('')+'</div>';h+=`<div class="pageTitle">${t(active)}</div>`;const allList=DATA.history[active]||[];const list=S.stage==='2'?allList.slice(0,Math.min(4,allList.length)):allList;h+=paginate(list,(it)=>`<div class="listItem" onclick="speak('${it.name}，${it.desc}');record({subject:'历史',tag:'${active}',title:'${it.name||''}'})"><div class="line1"><span class="name">${it.name||''}</span><span class="emoji">${it.emoji}</span></div><div class="desc">${it.desc}</div></div>`,6,'renderHistory');wrapPage(h);}
function renderSpace(){let h=subjectTop(t('space'));const tabs=[['solar','太阳系'],['stars','星星'],['galaxy','星系'],['exploration','探索']];const active=S.tab||'solar';h+='<div class="tabs">'+tabs.map(([k,label])=>`<div class="tab ${active===k?'on':''}" onclick="S.tab='${k}';S.page=0;renderSpace()">${t(k)||label}</div>`).join('')+'</div>';h+=`<div class="pageTitle">${t(active)}</div>`;const allList=DATA.space[active]||[];const list=S.stage==='2'?allList.slice(0,Math.min(3,allList.length)):allList;h+=paginate(list,(it)=>`<div class="listItem" onclick="speak('${it.name}，${it.desc}');record({subject:'宇宙',tag:'${active}',title:'${it.name||''}'})"><div class="line1"><span class="name">${it.name||''}</span><span class="emoji">${it.emoji}</span></div><div class="desc">${it.desc}</div></div>`,6,'renderSpace');wrapPage(h);}
