<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>儿童启蒙大百科 🌟 Kids Encyclopedia</title>
<style>
:root{
  --c1:#ff8fa3;--c2:#c77dff;--c3:#90e0ef;--c4:#90be6d;--c5:#f9c74f;--c6:#f4a261;
  --bg:linear-gradient(135deg,#fff0f5 0%,#f3e5f5 40%,#e3f2fd 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{width:100%;height:100%;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:#4a148c;overflow-x:hidden}
.page{display:none;width:100%;min-height:100vh;padding:16px;text-align:center}
.page.active{display:block;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(3deg)}}

.lang-switch{position:fixed;top:10px;right:10px;z-index:10000;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.7);padding:6px 12px;border-radius:24px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.lang-btn{font-size:24px;background:none;border:none;cursor:pointer;opacity:.4;transition:.2s;line-height:1;user-select:none;padding:2px 6px}
.lang-btn.active{opacity:1;transform:scale(1.25);filter:drop-shadow(0 2px 2px rgba(0,0,0,.15))}

.stage-card{width:90%;max-width:360px;margin:14px auto;padding:24px;border-radius:28px;color:#fff;font-size:22px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.12),0 8px 24px rgba(0,0,0,.1);transition:.2s;display:flex;align-items:center;justify-content:center;gap:12px}
.stage-card:active{transform:scale(.96)}
.stage-2-4{background:linear-gradient(135deg,#ff8fa3,#f472b6);box-shadow:0 6px 0 #db2777,0 8px 24px rgba(244,114,182,.35)}
.stage-4-6{background:linear-gradient(135deg,#c77dff,#a855f7);box-shadow:0 6px 0 #7e22ce,0 8px 24px rgba(168,85,247,.35)}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:640px;margin:16px auto}
.cat-card{background:rgba(255,255,255,.78);border-radius:24px;padding:18px 10px;backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.06);cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.cat-card:active{transform:scale(.95)}
.cat-icon{font-size:44px;animation:float 3s ease-in-out infinite}
.cat-name{font-size:17px;font-weight:700;color:#6a1b9a}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.back-btn{background:linear-gradient(135deg,#ffcc80,#ffa726);color:#fff;font-size:16px;font-weight:700;padding:10px 18px;border-radius:20px;box-shadow:0 4px 0 #ef6c00;border:none;cursor:pointer}
.back-btn:active{transform:scale(.95)}

.content-card{background:rgba(255,255,255,.75);border-radius:24px;padding:18px;margin:10px auto;max-width:700px;backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.06);text-align:left}
.item-title{font-size:20px;font-weight:800;color:#ad1457;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.item-body{font-size:16px;color:#4a148c;line-height:1.7}
.item-img{width:100%;border-radius:16px;margin:10px 0;object-fit:cover;max-height:220px;background:#f3e5f5}

.quiz-box{background:rgba(255,255,255,.78);border-radius:24px;padding:20px;margin:12px auto;max-width:640px;backdrop-filter:blur(8px);font-size:36px;font-weight:800;color:#6a1b9a;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.ans-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:14px 0}
.ans-btn{width:72px;height:72px;border-radius:50%;font-size:28px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.ans-btn:active{transform:scale(.92)}
.fb{font-size:28px;font-weight:800;margin:10px 0;min-height:40px}
.fb.ok{color:#2e7d32;animation:bounce .5s}
.fb.err{color:#d32f2f;animation:shake .4s}

.tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:10px 0}
.tab{background:rgba(255,255,255,.6);border:none;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:700;color:#6a1b9a;cursor:pointer;backdrop-filter:blur(4px)}
.tab.active{background:linear-gradient(135deg,#ff8fa3,#f472b6);color:#fff;box-shadow:0 3px 0 #db2777}
.tab.en{font-size:13px}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:600px;margin:10px auto}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:600px;margin:10px auto}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:600px;margin:10px auto}
.cell-card{background:linear-gradient(135deg,#ffe6f0,#f3e5f5);border-radius:18px;padding:14px 6px;font-size:15px;font-weight:700;color:#6a1b9a;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:80px;justify-content:center;box-shadow:0 3px 0 rgba(192,24,100,.15)}
.cell-big{font-size:28px;line-height:1}
.cell-small{font-size:12px;color:#8e24aa;font-weight:600}

.progress{display:flex;justify-content:center;gap:5px;margin:8px 0}
.dot{width:10px;height:10px;border-radius:50%;background:#e0e0e0;transition:.3s}
.dot.done{background:var(--c5);box-shadow:0 0 6px var(--c5)}

.hero{font-size:56px;animation:float 3s ease-in-out infinite;margin:8px 0}
.hero-title{font-size:36px;font-weight:800;color:#d81b60;text-shadow:2px 2px 0 #fff,3px 3px 0 #f8bbd0;margin:8px 0}
.sub{font-size:18px;color:#8e24aa;margin-bottom:16px}

.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

.nav-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:12px 0}
.nav-pill{background:rgba(255,255,255,.65);border:none;padding:8px 14px;border-radius:20px;font-size:14px;font-weight:700;color:#6a1b9a;cursor:pointer;backdrop-filter:blur(4px)}
.nav-pill.active{background:linear-gradient(135deg,#90e0ef,#42a5f5);color:#fff;box-shadow:0 3px 0 #1976d2}

@media(min-width:768px){
  .hero-title{font-size:48px}
  .cat-grid{grid-template-columns:repeat(3,1fr);max-width:800px}
  .quiz-box{font-size:48px}
  .ans-btn{width:90px;height:90px;font-size:36px}
}
</style>
</head>
<body>
<div class="lang-switch">
  <button class="lang-btn" id="btn-zh" onclick="setLang('zh')" title="中文">🇨🇳</button>
  <div style="width:1.5px;height:18px;background:#e0e0e0;border-radius:1px"></div>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')" title="English">🇬🇧</button>
</div>
<div class="confetti" id="confetti"></div>

<!-- 首页 -->
<div id="home" class="page active">
  <div class="hero">🌟</div>
  <div class="hero-title" data-i18n="appTitle">儿童启蒙大百科</div>
  <div class="sub" data-i18n="appSub">探索知识的快乐宇宙 🚀</div>
  <div class="stage-card stage-2-4" onclick="enterStage('stage2')">🧸 <span data-i18n="stage2">阶段一 · 2-4岁启蒙乐园</span></div>
  <div class="stage-card stage-4-6" onclick="enterStage('stage4')">🚀 <span data-i18n="stage4">阶段二 · 4-6岁探索世界</span></div>
</div>

<!-- 阶段首页 -->
<div id="stage" class="page">
  <div class="top-bar"><button class="back-btn" onclick="go('home')" data-i18n="back">← 返回</button></div>
  <div class="hero" id="stageIcon">🧸</div>
  <div class="hero-title" id="stageTitle">2-4岁启蒙乐园</div>
  <div class="cat-grid" id="stageCats"></div>
</div>

<!-- 学科内容页 -->
<div id="subject" class="page">
  <div class="top-bar">
    <button class="back-btn" onclick="goStage()" data-i18n="back">← 返回</button>
    <div style="font-size:22px;background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px">⭐ <span id="subStars">0</span></div>
  </div>
  <div class="hero" id="subIcon">📚</div>
  <div class="hero-title" id="subTitle">语文乐园</div>
  <div class="nav-row" id="subTabs"></div>
  <div id="subContent"></div>
</div>

<script>
/* ========= 国际化 ========= */
const i18n={
  zh:{
    appTitle:'儿童启蒙大百科',appSub:'探索知识的快乐宇宙 🚀',stage2:'阶段一 · 2-4岁启蒙乐园',stage4:'阶段二 · 4-6岁探索世界',back:'← 返回',
    chinese:'语文乐园',math:'数学王国',english:'英语天地',science:'日常百科',geo:'人文地理',history:'历史文化',space:'宇宙百科',
    numbers:'认识数字',poems:'古诗词',songs:'儿歌童谣',stories:'寓言故事',fables:'寓言故事',
    count:'快乐数数',addition:'趣味加法',subtraction:'趣味减法',
    letters:'26个字母',words:'常见单词',phrases:'日常用语',sentences:'日常短句',enStories:'寓言故事',
    animals:'动物王国',plants:'植物花园',transport:'交通工具',daily:'日常用品',common:'生活常识',
    landforms:'地形地貌',scenery:'风景名胜',rivers:'山川河流',
    dynasties:'朝代简史',emperors:'皇帝人物',cultureIn:'文化常识',
    solar:'太阳系',planets:'九大行星',galaxy:'银河系',earth:'地球家园',origin:'宇宙起源',
    correct:'🎉 答对啦！真棒！',wrong:'😢 不太对哦，再想想～',next:'下一题 →',finish:'太棒啦！练习完成！',
    countTitle:'数一数',countHint:'跟着数字一起读',letterTitle:'英文字母',letterHint:'点击字母听发音',
    wordTitle:'常见单词',wordHint:'看图识词学英文',
  },
  en:{
    appTitle:'Kids Encyclopedia',appSub:'Explore the Happy Universe of Knowledge 🚀',stage2:'Stage 1 · Ages 2-4 Playland',stage4:'Stage 2 · Ages 4-6 Explore World',back:'← Back',
    chinese:'Chinese Fun',math:'Math Kingdom',english:'English World',science:'Daily Science',geo:'World Geo',history:'History & Culture',space:'Space Science',
    numbers:'Numbers',poems:'Poems',songs:'Songs',stories:'Stories',fables:'Fables',
    count:'Counting Fun',addition:'Fun Addition',subtraction:'Fun Subtraction',
    letters:'ABC Letters',words:'Common Words',phrases:'Daily Phrases',sentences:'Short Sentences',enStories:'Fables',
    animals:'Animals',plants:'Plants',transport:'Transport',daily:'Daily Items',common:'Life Tips',
    landforms:'Landforms',scenery:'Scenery',rivers:'Rivers & Mountains',
    dynasties:'Dynasties',emperors:'Emperors',cultureIn:'Culture',
    solar:'Solar System',planets:'Planets',galaxy:'Galaxy',earth:'Our Earth',origin:'Origin',
    correct:'🎉 Correct! Awesome!',wrong:'😢 Not quite right, try again～',next:'Next →',finish:'Awesome! Practice complete!',
    countTitle:'Counting',countHint:'Read along with numbers',letterTitle:'English Letters',letterHint:'Tap to hear pronunciation',
    wordTitle:'Common Words',wordHint:'Learn words with pictures',
  }
};
let lang='zh',subStars=0;
function t(k){return (i18n[lang][k]||k)}
function setLang(l){
  lang=l;document.documentElement.lang=l==='en'?'en':'zh-CN';
  $('btn-zh').classList.toggle('active',l==='zh');$('btn-en').classList.toggle('active',l==='en');
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k])el.textContent=i18n[lang][k];});
  if(curSubject)renderSubject(curSubject,curStage);
}

/* ========= 工具函数 ========= */
const $=id=>document.getElementById(id);
let _zhVoice=null,_enVoice=null;
function initVoice(){const v=window.speechSynthesis.getVoices();_zhVoice=v.find(x=>/zh/i.test(x.lang))||v[0]||null;_enVoice=v.find(x=>/en/i.test(x.lang))||v[0]||null;}
if('speechSynthesis'in window){if(speechSynthesis.getVoices().length===0)speechSynthesis.addEventListener('voiceschanged',initVoice);else initVoice();}
const speak=text=>{if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text||'');if(lang==='zh'&&_zhVoice)u.voice=_zhVoice;if(lang==='en'&&_enVoice)u.voice=_enVoice;u.lang=lang==='en'?'en-US':'zh-CN';u.rate=0.82;u.pitch=1.15;window.speechSynthesis.speak(u);};
function go(pageId){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$(pageId).classList.add('active');if(pageId==='home')setLang(lang);}
function goStage(){go('stage');}
function celebrate(){const c=$('confetti'),colors=['#ff8fa3','#c77dff','#90e0ef','#90be6d','#f9c74f','#f4a261','#ef476f'];for(let i=0;i<36;i++){const el=document.createElement('div');el.style.cssText=`position:absolute;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:50%;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;top:-10px;animation:fall ${1.5+Math.random()*2}s linear forwards`;c.appendChild(el);setTimeout(()=>el.remove(),4000);}}
function addStar(){subStars++;$('subStars').textContent=subStars;celebrate();}

/* ========= 阶段 & 学科导航 ========= */
const stageData={
  stage2:{icon:'🧸',title:{zh:'2-4岁启蒙乐园',en:'Ages 2-4 Playland'},cats:[{id:'chinese',icon:'📚',name:'chinese'},{id:'math',icon:'🔢',name:'math'},{id:'english',icon:'🔤',name:'english'},{id:'science',icon:'🔬',name:'science'}]},
  stage4:{icon:'🚀',title:{zh:'4-6岁探索世界',en:'Ages 4-6 Explore World'},cats:[{id:'chinese',icon:'📚',name:'chinese'},{id:'math',icon:'🔢',name:'math'},{id:'english',icon:'🔤',name:'english'},{id:'science',icon:'🔬',name:'science'},{id:'geo',icon:'🗺️',name:'geo'},{id:'history',icon:'🏛️',name:'history'},{id:'space',icon:'🪐',name:'space'}]}
};
let curStage='',curSubject='',curTab='';
function enterStage(sid){curStage=sid;const s=stageData[sid];$('stageIcon').textContent=s.icon;$('stageTitle').textContent=s.title[lang];const grid=$('stageCats');grid.innerHTML='';s.cats.forEach(c=>{const d=document.createElement('div');d.className='cat-card';d.innerHTML=`<div class="cat-icon">${c.icon}</div><div class="cat-name">${t(c.name)}</div>`;d.onclick=()=>openSubject(c.id);grid.appendChild(d);});go('stage');}
function openSubject(sid){curSubject=sid;subStars=0;renderSubject(sid,curStage);go('subject');}

/* ========= 学科渲染器（动态路由） ========= */
function renderSubject(sid,stage){
  const icons={chinese:'📚',math:'🔢',english:'🔤',science:'🔬',geo:'🗺️',history:'🏛️',space:'🪐'};
  $('subIcon').textContent=icons[sid]||'📚';$('subTitle').textContent=t(sid);$('subStars').textContent=subStars;
  const tabs=$('subTabs'),content=$('subContent');tabs.innerHTML='';content.innerHTML='';
  const tabDefs=getTabDefs(sid,stage);
  tabDefs.forEach((tab,idx)=>{
    const b=document.createElement('button');b.className='tab'+(idx===0?' active':'');b.textContent=t(tab.key);
    b.onclick=()=>{document.querySelectorAll('#subTabs .tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderTab(sid,tab.key,content,stage);};tabs.appendChild(b);
  });
  if(tabDefs.length)renderTab(sid,tabDefs[0].key,content,stage);
}
function getTabDefs(sid,stage){
  if(sid==='chinese')return stage==='stage2'?[{key:'numbers'},{key:'poems'},{key:'songs'},{key:'stories'}]:[{key:'numbers'},{key:'poems'},{key:'songs'},{key:'fables'}];
  if(sid==='math')return stage==='stage2'?[{key:'count'},{key:'addition'},{key:'subtraction'}]:[{key:'count'},{key:'addition'},{key:'subtraction'}];
  if(sid==='english')return stage==='stage2'?[{key:'letters'},{key:'words'},{key:'phrases'}]:[{key:'letters'},{key:'words'},{key:'phrases'},{key:'sentences'},{key:'enStories'}];
  if(sid==='science')return[{key:'animals'},{key:'plants'},{key:'transport'},{key:'daily'},{key:'common'}];
  if(sid==='geo')return[{key:'landforms'},{key:'scenery'},{key:'rivers'}];
  if(sid==='history')return[{key:'dynasties'},{key:'emperors'},{key:'cultureIn'}];
  if(sid==='space')return[{key:'origin'},{key:'galaxy'},{key:'solar'},{key:'planets'},{key:'earth'}];
  return[];
}

/* ========= 数据 ========= */
const chineseChars='一二三四五六七八九十人口手水土火木日月田山石田禾上下左右大小多少来去开关门走跑吃哭笑哭笑爸妈爷奶兄弟姐妹我你他她它'.split('');
const hanziExtended='春夏秋冬风雨雷电雪天白云太阳月亮星星花草树木叶枝林森江河湖海泉冰雪冻冷热冷暖早晚阴晴圆亮黑洞远近高低长短宽窄厚薄深浅重轻重快慢缓急东西南北中内外前后左右方圆角点面线色彩红橙黄绿青蓝紫白黑灰粉金银铜铁石玉冰雪霜露雾云虹暴风雨雷电晴风雪霜露春夏秋冬鸟兽鱼虫鸡鸭鹅猫狗猪牛羊马鹿熊虎豹狼狐兔鼠蛇龟蛙蜜蜂蝴蝶蜻蜓蝉蛾蜘蛛蚂蚁蜗牛昆虫飞爬跳游走跑坐卧立站躺蹲趴翻滚推拉提抬扛抱背接送开关门窗扇桌椅板凳床架柜箱盒碗杯盘筷勺刀叉锅碗瓢盆衣食住行服帽鞋裙裤袜衣衫巾被毯枕垫套巾帕梳刷牙刷毛巾镜钟表钱金银珠宝钻玉石琴棋书画笔墨纸砚诗词歌赋文章字句段篇校师学生朋友同学工人农医生警察司机厨师商买卖交易...'.split('');

const poems=[
{title:'静夜思',author:'唐·李白',content:'床前明月光，疑是地上霜。举头望明月，低头思故乡。',emoji:'🌙'},
{title:'春晓',author:'唐·孟浩然',content:'春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。',emoji:'🌸'},
{title:'咏鹅',author:'唐·骆宾王',content:'鹅，鹅，鹅，曲项向天歌。白毛浮绿水，红掌拨清波。',emoji:'🦢'},
{title:'悯农（一）',author:'唐·李绅',content:'锄禾日当午，汗滴禾下土。谁知盘中餐，粒粒皆辛苦。',emoji:'🌾'},
{title:'登鹳雀楼',author:'唐·王之涣',content:'白日依山尽，黄河入海流。欲穷千里目，更上一层楼。',emoji:'🏯'},
{title:'望庐山瀑布',author:'唐·李白',content:'日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。',emoji:'💧'},
{title:'绝句',author:'唐·杜甫',content:'两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。',emoji:'🐦'},
{title:'江雪',author:'唐·柳宗元',content:'千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。',emoji:'❄️'},
{title:'赋得古原草送别',author:'唐·白居易',content:'离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。',emoji:'🌿'},
{title:'游子吟',author:'唐·孟郊',content:'慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。',emoji:'❤️'},
{title:'池上',author:'唐·白居易',content:'小娃撑小艇，偷采白莲回。不解藏踪迹，浮萍一道开。',emoji:'🛶'},

/* ========= 数学引擎 ========= */
function seeded(seed){let x=seed;return()=>{x=(x*16807+0)%2147483647;return(x-1)/2147483646;}}
function makeFixed(range,total,seedStart,type){
  const rng=seeded(seedStart);const out=[];const used=new Set();
  while(out.length<total){
    let a=Math.floor(rng()*range)+1;let b=Math.floor(rng()*range)+1;
    if(type==='add'){if(a+b>range)continue;out.push({a,b,op:'+',ans:a+b});}
    else{if(a<=b){let t=a;a=b;b=t;}out.push({a,b,op:'-',ans:a-b});}
  }
  return out;
}
function makeRandom(range,total,type){
  const out=[];while(out.length<total){
    let a=Math.floor(Math.random()*range)+1;let b=Math.floor(Math.random()*range)+1;
    if(type==='add'){if(a+b>range)continue;out.push({a,b,op:'+',ans:a+b});}
    else{if(a<=b){let t=a;a=b;b=t;}out.push({a,b,op:'-',ans:a-b});}
  }
  return out;
}
const mathRanges=[
  {label:'10以内',range:10,fixed:50,rand:50,seed:1,type:'add'},
  {label:'10以内',range:10,fixed:50,rand:50,seed:10001,type:'sub'},
  {label:'20以内',range:20,fixed:50,rand:50,seed:20001,type:'add'},
  {label:'20以内',range:20,fixed:50,rand:50,seed:30001,type:'sub'},
  {label:'100以内',range:100,fixed:50,rand:50,seed:40001,type:'add'},
  {label:'100以内',range:100,fixed:50,rand:50,seed:50001,type:'sub'},
  {label:'200以内',range:200,fixed:50,rand:100,seed:60001,type:'add'},
  {label:'200以内',range:200,fixed:50,rand:100,seed:70001,type:'sub'},
  {label:'1000以内',range:1000,fixed:100,rand:500,seed:80001,type:'add'},
  {label:'1000以内',range:1000,fixed:100,rand:500,seed:90001,type:'sub'},
];
let mathBank={},mathState={};
function buildMathBank(){
  mathBank={};
  mathRanges.forEach(r=>{
    const key=r.range+'_'+(r.type==='add'?'add':'sub');
    mathBank[key]={fixed:makeFixed(r.range,r.fixed,r.seed,r.type),random:makeRandom(r.range,r.rand,r.type),label:r.label,type:r.type};
  });
}

function startMathQuiz(range,type,box){
  const data=mathBank[range+'_'+type];if(!data)return;
  const pool=[...data.fixed,...data.random].sort(()=>Math.random()-0.5);
  let idx=0,answered=false;
  const total=Math.min(pool.length,50);
  box.innerHTML='';
  const card=document.createElement('div');card.className='content-card';card.id='mathCard';
  card.innerHTML=`<div style="text-align:center"><div class="progress" id="mathProg"></div>`+
    `<div class="quiz-box" id="mathQ" style="font-size:42px">?</div>`+
    `<div id="mathViz" style="font-size:32px;margin:8px 0"></div>`+
    `<div class="ans-row" id="mathAns"></div>`+
    `<div class="fb" id="mathFb"></div>`+
    `<button class="back-btn" id="mathNextBtn" style="margin-top:8px;width:auto;padding:12px 24px" disabled>${t('next')}</button></div>`;
  box.appendChild(card);

  function showMathQ(q){
    answered=false;renderMathProg(idx+1,total);
    $('mathQ').textContent=q.a+' '+q.op+' '+q.b+' = ?';
    const emos=['🍎','🍰','🌸','⭐','🎈'];const e=emos[idx%emos.length];
    $('mathViz').textContent=(type==='add'?e.repeat(Math.min(q.a,8))+' ＋ '+e.repeat(Math.min(q.b,8)):'🎁'.repeat(Math.min(q.a,8))+' － '+'❌'.repeat(Math.min(q.b,8)));
    $('mathFb').textContent='';$('mathFb').className='fb';
    const nxt=$('mathNextBtn');nxt.disabled=true;nxt.style.opacity='0.5';nxt.textContent=t('next');
    let wrongs=new Set();while(wrongs.size<2){let w=Math.floor(Math.random()*(range*1.5));if(w!==q.ans&&w>=0)wrongs.add(w);}
    const opts=[q.ans,...wrongs].sort(()=>Math.random()-0.5);
    const abox=$('mathAns');abox.innerHTML='';
    opts.forEach((n,i)=>{
      const btn=document.createElement('button');btn.className='ans-btn';btn.style.cssText=`background:linear-gradient(135deg,#90e0ef,#42a5f5);box-shadow:0 4px 0 #1976d2;font-size:28px;border:none;cursor:pointer`;btn.textContent=n;
      btn.style.animation='pop .4s ease '+(i*0.08)+'s backwards';abox.appendChild(btn);
      btn.onclick=()=>{if(answered)return;answered=true;
        if(n===q.ans){btn.style.background='#66bb6a';btn.style.boxShadow='0 4px 0 #388e3c';$('mathFb').textContent=t('correct');$('mathFb').className='fb ok';addStar();celebrate();speak(String(q.ans));
          nxt.disabled=false;nxt.style.opacity='1';idx++;if(idx>=total){nxt.textContent=t('finish');$('mathFb').textContent=t('finish');}
        }else{btn.style.background='#ef5350';btn.style.boxShadow='0 4px 0 #c62828';$('mathFb').textContent=t('wrong');$('mathFb').className='fb err';speak(lang==='en'?'Try again':'再想想');
          setTimeout(()=>{btn.style.background='';btn.style.boxShadow='';$('mathFb').textContent='';answered=false;},1200);
        }
      };
    });
    const say=lang==='en'?('What is '+q.a+(type==='add'?' plus ':' minus ')+q.b+'?'):(q.a+(type==='add'?'加':'减')+q.b+'等于几');speak(say);
  }
  $('mathNextBtn').onclick=()=>{if(idx>=total){renderSubject(curSubject,curStage);}else{showMathQ(pool[idx]);}};
  renderMathProg(1,total);showMathQ(pool[0]);
}
function renderMathProg(cur,total){const box=$('mathProg');if(!box)return;box.innerHTML='';for(let i=1;i<=total;i++){const d=document.createElement('div');d.className='dot'+(i<=cur?' done':'');box.appendChild(d);}}

/* 启动 */
buildMathBank();setLang(navigator.language&&navigator.language.toLowerCase().startsWith('zh')?'zh':'en');
</script>
</body>
</html>
