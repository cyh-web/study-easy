<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>儿童启蒙万花筒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(145deg,#fff5f8,#e1f5fe);min-height:100vh;color:#4a4a4a;line-height:1.6;overflow-x:hidden}
.topbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:10px 12px;background:#fff;border-radius:0 0 24px 24px;box-shadow:0 4px 16px rgba(0,0,0,.07);position:sticky;top:0;z-index:10;gap:8px}
.logo{display:flex;align-items:center;font-size:17px;font-weight:800;color:#b03060;gap:6px;white-space:nowrap}
.stage{display:flex;gap:6px;flex-wrap:wrap}
.stage-btn{background:linear-gradient(135deg,#f8bbd0,#f48fb1);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 3px 8px rgba(244,143,177,.4);transition:transform .2s;white-space:nowrap}
.stage-btn:hover{transform:scale(1.05)}
.stage-btn.on{background:linear-gradient(135deg,#ce93d8,#ba68c8)}
.lang-btn{background:#fff0f6;color:#b03060;border:2px solid #f8bbd0;padding:5px 10px;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.home-btn{background:#fff0f6;color:#ad1457;border:2px solid #f8bbd0;padding:5px 10px;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.main{padding:8px 10px;max-width:960px;margin:0 auto}
.hero{background:linear-gradient(145deg,#f8bbd0,#e1bee7);border-radius:24px;padding:14px 16px;margin:8px 0;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.06);color:#880e4f}
.hero h2{font-size:20px;margin-bottom:4px}
.hero p{font-size:13px;opacity:.9}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:8px 0}
.grid-5{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:6px 0}
.grid-10{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin:6px 0}
.subj{background:#fff;border:none;border-radius:18px;padding:12px 4px;font-size:14px;font-weight:800;color:#6a1b9a;box-shadow:0 4px 12px rgba(0,0,0,.07);text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.subj:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.11)}
.subj::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.3);opacity:0;transition:opacity .2s}
.subj:hover::after{opacity:1}
.panel{background:#fff;border-radius:18px;padding:12px 12px 8px;margin:8px 0;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.panel-title{font-size:16px;font-weight:800;color:#880e4f;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.panel-body{font-size:14px;color:#555;line-height:1.7}
.cell{background:#fce4ec;border-radius:14px;padding:6px 4px;text-align:center;cursor:pointer;transition:transform .15s;border:2px solid transparent;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.cell:hover{border-color:#f8bbd0;transform:scale(1.04)}
.cell-big{font-size:22px;font-weight:800;color:#ad1457;line-height:1.1}
.cell-en{font-size:11px;color:#888;font-weight:700}
.cell-pinyin{font-size:12px;color:#8e24aa;font-weight:700}
.cell-desc{font-size:11px;color:#666;line-height:1.3}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 8px;justify-content:center}
.tab{background:#fff;border:2px solid #f8bbd0;color:#ad1457;padding:5px 10px;border-radius:18px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#f8bbd0,#ce93d8);color:#fff;border-color:transparent}
.card-btn{display:block;margin:6px auto;width:100%;max-width:400px;padding:12px;font-size:15px;font-weight:800;border:none;border-radius:20px;color:#fff;background:linear-gradient(135deg,#f8bbd0,#f48fb1);cursor:pointer;transition:transform .15s;box-shadow:0 4px 0 rgba(0,0,0,.12)}
.card-btn:hover{transform:scale(1.02)}
.ans{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ans-btn{font-size:20px;font-weight:800;border:none;border-radius:16px;padding:10px 18px;color:#fff;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.12);transition:transform .15s;min-width:64px}
.ans-btn:hover{transform:scale(1.05)}
.quiz{font-size:28px;font-weight:900;color:#880e4f;text-align:center;margin:6px 0;min-height:36px}
.prog{display:flex;justify-content:center;gap:4px;margin-bottom:6px}
.dot{width:9px;height:9px;border-radius:50%;background:#eee}
.dot.ok{background:#66bb6a}
.fb{text-align:center;font-size:18px;font-weight:800;min-height:24px;margin-top:6px}
.fb.ok{color:#2e7d32}
.fb.err{color:#c62828}
.back-btn{background:linear-gradient(135deg,#ce93d8,#ba68c8);border:none;color:#fff;padding:8px 18px;border-radius:20px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 8px rgba(0,0,0,.1);margin-top:6px}
.footer{text-align:center;padding:20px 10px 40px;color:#999;font-size:12px}
.stat-board{background:#fff;border-radius:20px;padding:12px;margin:8px 0;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat-box{text-align:center;padding:6px;border-radius:14px;cursor:pointer;transition:transform .2s,background .2s}
.stat-box:hover{transform:scale(1.04);background:#fce4ec}
.stat-num{font-size:24px;font-weight:900;color:#ad1457;line-height:1}
.stat-label{font-size:11px;color:#888;margin-top:3px}
.plan-bar-wrap{position:relative;height:16px;background:#fce4ec;border-radius:10px;margin:10px 4px 4px;overflow:hidden}
.plan-bar{height:100%;background:linear-gradient(90deg,#f48fb1,#ce93d8);width:0%;border-radius:10px;transition:width .5s ease}
.plan-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#880e4f;pointer-events:none}
.today-list{display:flex;gap:5px;overflow-x:auto;padding:6px 2px;margin:4px 0;scrollbar-width:none}
.today-list::-webkit-scrollbar{display:none}
.today-item{flex:0 0 auto;background:#fce4ec;color:#880e4f;padding:4px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.plan-set{text-align:center;margin-top:4px}
.plan-set button{background:#fff0f6;color:#ad1457;border:2px solid #f8bbd0;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.on{display:flex}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;max-width:100%;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.15);animation:slideUp .35s ease}
.modal-head{padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #fce4ec}
.modal-title{font-size:18px;font-weight:800;color:#880e4f}
.modal-close{background:#fce4ec;border:none;width:32px;height:32px;border-radius:50%;font-size:20px;color:#ad1457;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.modal-body{padding:10px 14px 18px;overflow-y:auto;flex:1}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin:5px 0;background:linear-gradient(135deg,#fff5f8,#fce4ec);border-radius:12px;font-size:13px}
.history-item span{color:#880e4f;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.history-item time{color:#999;font-size:11px;flex-shrink:0}
.history-date{background:#f8bbd0;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:800;display:inline-block;margin:4px 0}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.panel{animation:pop .5s ease both}

@media(min-width:480px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .grid-5{grid-template-columns:repeat(4,1fr)}
  .grid-10{grid-template-columns:repeat(7,1fr)}
  .logo{font-size:19px}
  .hero h2{font-size:22px}
  .hero p{font-size:14px}
  .stat-num{font-size:26px}
  .cell-big{font-size:24px}
}

@media(min-width:720px){
  .grid{grid-template-columns:repeat(4,1fr)}
  .grid-5{grid-template-columns:repeat(5,1fr)}
  .grid-10{grid-template-columns:repeat(10,1fr)}
  .main{padding:16px 24px}
  .subj{padding:16px;font-size:15px}
  .hero h2{font-size:24px}
  .hero p{font-size:14px}
  .logo{font-size:20px}
  .quiz{font-size:34px}
  .cell{min-height:72px;padding:8px}
  .stat-row{display:flex;justify-content:space-around;gap:8px}
  .modal-overlay{align-items:center;padding:14px}
  .modal-sheet{border-radius:28px;max-width:520px;max-height:80vh;animation:pop .3s ease}
}

</style>
</head>
<body>
<div class="topbar">
  <div class="logo">儿童启蒙万花筒</div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
    <button class="home-btn" id="homeBtn" onclick="renderHome()" style="display:none">🏠 返回首页</button>
    <div class="stage">
    <button id="btnS2" class="stage-btn on" onclick="goStage('s2')">2-4岁</button>

    <button class="lang-btn" onclick="toggleLang()">中/EN</button>
  </div>
</div>
</div>
<div class="main">

    </div>
    <div class="plan-bar-wrap">
      <div class="plan-bar" id="planBar"></div>

    </div>
    <div class="today-list" id="todayList"></div>
    <div class="plan-set"><button onclick="setPlanPrompt()">设定每日目标</button></div>

  <div class="grid" id="subGrid"></div>
  <div id="tabArea"></div>
  <div id="content"></div>
</div>
<div class="footer">用声音和好奇心学习世界 · 中英双语随时切换</div>

const POEMS=[{title:'静夜思',author:'唐 李白',content:'床前明月光，疑是地上霜。举头望明月，低头思故乡。'},{title:'春晓',author:'唐 孟浩然',content:'春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。'},{title:'咏鹅',author:'唐 骆宾王',content:'鹅鹅鹅，曲项向天歌。白毛浮绿水，红掌拨清波。'},{title:'悯农',author:'唐 李绅',content:'锄禾日当午，汗滴禾下土。谁知盘中餐，粒粒皆辛苦。'},{title:'登鹳雀楼',author:'唐 王之涣',content:'白日依山尽，黄河入海流。欲穷千里目，更上一层楼。'},{title:'望庐山瀑布',author:'唐 李白',content:'日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。'},{title:'绝句',author:'唐 杜甫',content:'两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。'},{title:'江雪',author:'唐 柳宗元',content:'千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。'},{title:'赋得古原草送别',author:'唐 白居易',content:'离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。'},{title:'游子吟',author:'唐 孟郊',content:'慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。'},{title:'池上',author:'唐 白居易',content:'小娃撑小艇，偷采白莲回。不解藏踪迹，浮萍一道开。'},{title:'村居',author:'清 高鼎',content:'草长莺飞二月天，拂堤杨柳醉春烟。儿童散学归来早，忙趁东风放纸鸢。'},{title:'小池',author:'宋 杨万里',content:'泉眼无声惜细流，树阴照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。'},{title:'所见',author:'清 袁枚',content:'牧童骑黄牛，歌声振林樾。意欲捕鸣蝉，忽然闭口立。'},{title:'山行',author:'唐 杜牧',content:'远上寒山石径斜，白云深处有人家。停车坐爱枫林晚，霜叶红于二月花。'},{title:'赠汪伦',author:'唐 李白',content:'李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。'},{title:'望天门山',author:'唐 李白',content:'天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。'},{title:'饮湖上初晴后雨',author:'宋 苏轼',content:'水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。'},{title:'早发白帝城',author:'唐 李白',content:'朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。'},{title:'凉州词',author:'唐 王翰',content:'葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回。'},{title:'出塞',author:'唐 王昌龄',content:'秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。'},{title:'鹿柴',author:'唐 王维',content:'空山不见人，但闻人语响。返景入深林，复照青苔上。'},{title:'鸟鸣涧',author:'唐 王维',content:'人闲桂花落，夜静春山空。月出惊山鸟，时鸣春涧中。'},{title:'相思',author:'唐 王维',content:'红豆生南国，春来发几枝。愿君多采撷，此物最相思。'},{title:'寻隐者不遇',author:'唐 贾岛',content:'松下问童子，言师采药去。只在此山中，云深不知处。'},{title:'画',author:'唐 王维',content:'远看山有色，近听水无声。春去花还在，人来鸟不惊。'},{title:'回乡偶书',author:'唐 贺知章',content:'少小离家老大回，乡音无改鬓毛衰。儿童相见不相识，笑问客从何处来。'},{title:'九月九日忆山东兄弟',author:'唐 王维',content:'独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。'},{title:'敕勒歌',author:'北朝民歌',content:'敕勒川，阴山下。天似穹庐，笼盖四野。天苍苍，野茫茫，风吹草低见牛羊。'},{title:'江南',author:'汉乐府',content:'江南可采莲，莲叶何田田。鱼戏莲叶间。鱼戏莲叶东，鱼戏莲叶西，鱼戏莲叶南，鱼戏莲叶北。'}];
const SONGS=[{title:'小白兔',content:'小白兔白又白，两只耳朵竖起来，爱吃萝卜和青菜，蹦蹦跳跳真可爱。'},{title:'小星星',content:'一闪一闪亮晶晶，满天都是小星星，挂在天上放光明，好像许多小眼睛。'},{title:'两只老虎',content:'两只老虎两只老虎，跑得快跑得快，一只没有耳朵一只没有尾巴，真奇怪真奇怪。'},{title:'小燕子',content:'小燕子穿花衣，年年春天来这里，我问燕子为啥来，燕子说这里的春天最美丽。'},{title:'拔萝卜',content:'拔萝卜拔萝卜，嘿哟嘿哟拔萝卜，老太婆快快来，快来帮我们拔萝卜。'},{title:'小毛驴',content:'我有一只小毛驴，我从来也不骑。'},{title:'数鸭子',content:'门前大桥下游过一群鸭，快来快来数一数，二四六七八。'},{title:'找朋友',content:'找呀找呀找朋友，找到一个好朋友，敬个礼呀握握手，你是我的好朋友。'},{title:'小青蛙',content:'小青蛙呱呱呱，水里游岸上爬，吃害虫保庄稼，人人都要保护它。'},{title:'小蜜蜂',content:'小蜜蜂嗡嗡嗡，飞到西飞到东，传花粉采花蜜，我们学它爱劳动。'},{title:'卖报歌',content:'啦啦啦我是卖报的小行家，不等天明去等派报。'},{title:'泥娃娃',content:'泥娃娃泥娃娃，一个泥娃娃，也有那眉毛也有那眼睛，眼睛不会眨。'},{title:'蜗牛与黄鹂鸟',content:'阿门阿前一棵葡萄树，阿嫩阿嫩绿地刚发芽，蜗牛背着那重重的壳呀，一步一步地往上爬。'},{title:'上学歌',content:'太阳当空照花儿对我笑，小鸟说早早早，你为什么背上小书包。'},{title:'丢手绢',content:'丢丢丢手绢，轻轻地放在小朋友的后面，大家不要告诉他，快点快点抓住他。'},{title:'一分钱',content:'我在马路边捡到一分钱，把它交到警察叔叔手里边。'},{title:'摇篮曲',content:'月儿明风儿静，树叶儿遮窗棂。'},{title:'捉泥鳅',content:'池塘的水满了雨也停了，田边的稀泥里到处是泥鳅。'},{title:'采蘑菇的小姑娘',content:'采蘑菇的小姑娘，背着一个大竹筐。'},{title:'上学去',content:'太阳公公起得早，小宝宝背着书包上学校。'}];
const FABLES=[{title:'乌鸦喝水',content:'乌鸦口渴了，到处找水喝。它看见瓶子里有水，可是瓶子太高够不着。乌鸦叼来小石子放进瓶里，水面升高了，终于喝到水了！'},{title:'龟兔赛跑',content:'乌龟和兔子比赛。兔子跑得快，就在路边睡着了。乌龟一直慢慢爬，最后第一个到达终点。'},{title:'狐假虎威',content:'狐狸被老虎抓住了，说我是百兽之王，不信你跟在我后面走一圈。动物们见到老虎都吓跑了，狐狸很得意。'},{title:'守株待兔',content:'农夫在田里干活，一只兔子撞到树桩死了。他每天守着树桩等兔子，田地荒芜了，再也没等到。'},{title:'揠苗助长',content:'农夫嫌禾苗长得慢，把它们一棵棵拔高，结果禾苗全都枯萎了。'},{title:'农夫与蛇',content:'冬天农夫救了一条冻僵的蛇，放在怀里取暖。蛇醒来后咬了农夫一口，农夫死了。'},{title:'对牛弹琴',content:'音乐家对着牛弹琴，牛只顾吃草不理他。'},{title:'画蛇添足',content:'一个人最快画好蛇，却给蛇添上脚，结果输了比赛。'},{title:'井底之蛙',content:'青蛙住在井里，觉得天只有井口那么大。海龟告诉它大海有多辽阔。'},{title:'盲人摸象',content:'盲人想知道大象长什么样，摸到不同部位说不同形状，吵了起来。'},{title:'南辕北辙',content:'一个人要去南方却驾车往北走，条件越好离目标越远。'},{title:'掩耳盗铃',content:'小偷想偷钟，捂住自己耳朵去搬，结果被人发现抓了。'},{title:'叶公好龙',content:'叶公到处画龙刻龙，真龙来了却吓得拔腿就跑。'},{title:'亡羊补牢',content:'羊圈破了丢了羊，邻居劝他修补。他又丢了一只才补上，再没丢羊。'},{title:'买椟还珠',content:'一个人买了装珍珠的盒子，却觉得盒子更漂亮，把珍珠还了只留下空盒子。'},{title:'刻舟求剑',content:'坐船时把剑掉水里，他在船边刻记号，船靠岸后沿记号下水找，当然找不到。'}];

function noEmoji(s){if(!s)return'';let r=s;for(let k in EMOJI_MAP){r=r.split(k).join('')}return r}
let synth=window.speechSynthesis;
function speak(text){if(!text)return;synth.cancel();const clean=em2text(text);const u=new SpeechSynthesisUtterance(clean);u.rate=0.85;u.pitch=1.18;u.lang=clean.match(/[a-zA-Z]/)&&!clean.match(/[\u4e00-\u9fa5]/)?'en-US':'zh-CN';const voices=synth.getVoices();const v=voices.find(v=>v.lang===u.lang)||voices.find(v=>v.lang.includes('zh')&&u.lang.includes('zh'))||voices[0];if(v)u.voice=v;synth.speak(u);}
function speakEn(text){if(!text)return;synth.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.9;u.pitch=1.1;const voices=synth.getVoices();const v=voices.find(v=>v.lang.startsWith('en'))||voices[0];if(v)u.voice=v;synth.speak(u);}
function em2text(s){if(!s)return'';let r=s;Object.keys(EMOJI_MAP).forEach(k=>{r=r.split(k).join(EMOJI_MAP[k]+' ')});return r}
function speakBilingual(enText,zhText){if(!enText&&!zhText)return;synth.cancel();const voices=synth.getVoices();if(enText){const u=new SpeechSynthesisUtterance(enText);u.lang='en-US';u.rate=0.9;u.pitch=1.1;const v=voices.find(v=>v.lang.startsWith('en'))||voices[0];if(v)u.voice=v;synth.speak(u)}if(zhText){const u=new SpeechSynthesisUtterance(zhText);u.lang='zh-CN';u.rate=0.85;u.pitch=1.18;const v=voices.find(v=>v.lang==='zh-CN')||voices.find(v=>v.lang.includes('zh'))||voices[0];if(v)u.voice=v;synth.speak(u)}}

const DT=new Date().toISOString().slice(0,10);
function getStats(){let s=localStorage.getItem('kidsStats');try{s=JSON.parse(s)||{}}catch(e){s={}};if(!s.date||s.date!==DT){s.todayList=[];s.today=0;s.date=DT}if(s.total===undefined)s.total=0;if(!s.plan)s.plan=20;if(!Array.isArray(s.todayList))s.todayList=[];if(!Array.isArray(s.history))s.history=[];return s}
function saveStats(o){localStorage.setItem('kidsStats',JSON.stringify(o))}
function recordStat(title){if(!title)return;const o=getStats();o.total++;o.today++;o.todayList.push({t:title.trim(),time:new Date().toLocaleTimeString(),date:DT});if(o.todayList.length>30)o.todayList=o.todayList.slice(-30);o.history.push({t:title.trim(),time:new Date().toLocaleTimeString(),date:DT});if(o.history.length>200)o.history=o.history.slice(-200);saveStats(o);updateStatsUI();}
function updateStatsUI(){const o=getStats();$('totalCount').textContent=o.total;$('todayCount').textContent=o.today;$('planGoal').textContent=o.plan||20;const pct=Math.min(100,Math.round(o.today/(o.plan||20)*100));$('planBar').style.width=pct+'%';$('planText').textContent=(lang==='zh'?'计划进度 ':'Plan ')+o.today+'/'+(o.plan||20)+' ('+pct+'%)';const tl=$('todayList');tl.innerHTML='';const see=o.todayList.slice().reverse();see.forEach(item=>{const sp=document.createElement('span');sp.className='today-item';sp.textContent=item.t.replace(/[\u4e00-\u9fa5]/g,'$&').slice(0,12);if(!sp.textContent)sp.textContent='学习内容';tl.appendChild(sp)});$('totalCount').parentElement.onclick=()=>showHistory('total');$('todayCount').parentElement.onclick=()=>showHistory('today');}
function setPlanPrompt(){const cur=getStats().plan||20;const n=prompt(lang==='zh'?'设置今日学习目标数量：':'Set daily goal:',String(cur));if(n!==null&&!isNaN(n)&&Number(n)>0){const o=getStats();o.plan=Number(n);saveStats(o);updateStatsUI();}}

/* ===== 数学引擎 ===== */
function mkRng(s){let x=s;return()=>{x=(x*16807+0)%2147483647;return(x-1)/2147483646}}
function mkFix(R,N,s,type){const r=mkRng(s);const o=[];while(o.length<N){let a=Math.floor(r()*R)+1;let b=Math.floor(r()*R)+1;if(type==='add'){if(a+b>R)continue;o.push({a,b,op:'+',ans:a+b})}else{if(a<=b){let t=a;a=b;b=t}o.push({a,b,op:'-',ans:a-b})}}return o}
function mkRan(R,N,type){const o=[];while(o.length<N){let a=Math.floor(Math.random()*R)+1;let b=Math.floor(Math.random()*R)+1;if(type==='add'){if(a+b>R)continue;o.push({a,b,op:'+',ans:a+b})}else{if(a<=b){let t=a;a=b;b=t}o.push({a,b,op:'-',ans:a-b})}}return o}
const MR=[{r:10,f:50,rn:50,s:1,t:'add'},{r:10,f:50,rn:50,s:10001,t:'sub'},{r:20,f:50,rn:50,s:20001,t:'add'},{r:20,f:50,rn:50,s:30001,t:'sub'},{r:100,f:50,rn:50,s:40001,t:'add'},{r:100,f:50,rn:50,s:50001,t:'sub'},{r:200,f:50,rn:100,s:60001,t:'add'},{r:200,f:50,rn:100,s:70001,t:'sub'},{r:1000,f:100,rn:500,s:80001,t:'add'},{r:1000,f:100,rn:500,s:90001,t:'sub'}];
let MB={};function buildMB(){MB={};MR.forEach(x=>{MB[x.r+'_'+x.t]={fixed:mkFix(x.r,x.f,x.s,x.t),random:mkRan(x.r,x.rn,x.t),r:x.r,type:x.t}})}

  card.innerHTML='<div style="text-align:center"><div class="prog" id="mp"></div><div class="quiz" id="mq">?</div><div id="mviz" style="font-size:28px;margin:6px 0;min-height:36px"></div><div class="ans" id="ma"></div><div class="fb" id="mf"></div><button class="back-btn" id="mnxt" style="margin-top:6px" disabled>'+t('next','math')+'</button><button class="back-btn" style="margin-top:6px;margin-left:8px" onclick="renderSubject(&quot;math&quot;,curStage)">返回</button></div>';
  box.appendChild(card);
  function showQ(q){answered=false;prog(idx+1,total);const say=lang==='en'?('What is '+q.a+(type==='add'?' plus ':' minus ')+q.b):(q.a+(type==='add'?'加':'减')+q.b+'等于几');speak(say);$('mq').textContent=q.a+' '+q.op+' '+q.b+' = ?';const em=['🍎','🍰','🌸','⭐'];const e=em[idx%em.length];$('mviz').textContent=(type==='add'?e.repeat(Math.min(q.a,6))+' ＋ '+e.repeat(Math.min(q.b,6)):'🎁'.repeat(Math.min(q.a,6))+' － '+String.fromCodePoint(0x274C).repeat(Math.min(q.b,6)));$('mf').textContent='';$('mf').className='fb';const nxt=$('mnxt');nxt.disabled=true;nxt.style.opacity='0.5';nxt.textContent=t('next','math');let wrongs=new Set();while(wrongs.size<2){let w=Math.floor(Math.random()*R*1.2);if(w!==q.ans&&w>=0)wrongs.add(w)}const opts=[q.ans,...wrongs].sort(()=>Math.random()-0.5);const abox=$('ma');abox.innerHTML='';opts.forEach((n,i)=>{const btn=document.createElement('button');btn.className='ans-btn';btn.style.cssText='background:linear-gradient(135deg,#90caf9,#42a5f5);box-shadow:0 4px 0 #1976d2;font-size:24px;border:none';btn.textContent=n;btn.style.animation='pop .4s ease '+(i*0.06)+'s backwards';abox.appendChild(btn);btn.onclick=()=>{if(answered)return;answered=true;if(n===q.ans){btn.style.background='#66bb6a';btn.style.boxShadow='0 4px 0 #388e3c';$('mf').textContent=t('correct','math');$('mf').className='fb ok';learn('数学题 '+q.a+' '+q.op+' '+q.b);celebrate();speak(String(q.ans));nxt.disabled=false;nxt.style.opacity='1';idx++;if(idx>=total){nxt.textContent=t('finish','math');$('mf').textContent=t('finish','math')}}else{btn.style.background='#ef5350';btn.style.boxShadow='0 4px 0 #c62828';$('mf').textContent=t('wrong','math');$('mf').className='fb err';speak(lang==='en'?'Try again':'再想想');setTimeout(()=>{btn.style.background='';btn.style.boxShadow='';$('mf').textContent='';answered=false},1200)}}});}
  $('mnxt').onclick=()=>{if(idx>=total){renderSubject('math',curStage)}else{showQ(pool[idx])}};
  showQ(pool[0]);
  function prog(cur,tot){const b=$('mp');b.innerHTML='';for(let i=1;i<=tot;i++){const d=document.createElement('div');d.className='dot'+(i<=cur?' ok':'');b.appendChild(d)}}
}

function renderEnglish(tab,box,stage){
  if(tab==='letters'){
    box.innerHTML='<div class="panel"><div class="panel-title">26 Letters</div><div class="grid-5" id="ag"></div></div>';
    const g=$('ag');ABC.forEach(L=>{const c=document.createElement('div');c.className='cell';c.innerHTML='<div class="cell-big">'+L+'</div><div class="cell-en">'+L.toLowerCase()+'</div>';c.onclick=()=>{speakBilingual(L.toLowerCase(),'字母 '+L);learn('字母 '+L)};g.appendChild(c)});
  }else if(tab==='words'){
    const cats=Object.keys(EWORDS);box.innerHTML='';const container=document.createElement('div');container.className='panel';
    const h=document.createElement('div');h.className='panel-title';h.textContent=t('words','english');container.appendChild(h);
    cats.forEach(cat=>{const arr=EWORDS[cat];const sec=document.createElement('h4');sec.style.cssText='color:#ad1457;margin:12px 0 4px;font-size:17px';sec.textContent=cat;container.appendChild(sec);const grid=document.createElement('div');grid.className='grid-5';arr.forEach(it=>{const c=document.createElement('div');c.className='cell';c.style.cssText='min-height:60px;cursor:pointer;font-size:13px';c.innerHTML='<div class="cell-big">'+it.w.replace(/</g,'&lt;')+'</div><div class="cell-en">'+it.t+'</div>';c.onclick=()=>{speakBilingual(it.w,it.t);learn('单词 '+it.w)};grid.appendChild(c)});container.appendChild(grid)});
    box.appendChild(container);
  }else if(tab==='phrases'){box.innerHTML='';PHRASES.forEach((p,i)=>{const d=document.createElement('div');d.className='panel';d.style.cursor='pointer';d.innerHTML='<div class="panel-title" style="font-size:20px">'+p.en+'</div><div class="panel-body">'+p.zh+'</div>';d.onclick=()=>{speakBilingual(p.en,p.zh);learn(p.en)};box.appendChild(d)})}
  else if(tab==='sentences'){box.innerHTML='';SENTENCES.forEach((s,i)=>{const d=document.createElement('div');d.className='panel';d.style.cursor='pointer';d.innerHTML='<div class="panel-title" style="font-size:18px">'+s.en+'</div><div class="panel-body">'+s.zh+'</div>';d.onclick=()=>{speakBilingual(s.en,s.zh);learn(s.en)};box.appendChild(d)})}
  else if(tab==='enStories'){const list=stage==='s2'?FABLES.slice(0,5):FABLES;box.innerHTML='';list.forEach((f,i)=>{const d=document.createElement('div');d.className='panel';d.style.cursor='pointer';d.innerHTML='<div class="panel-title">'+f.title+'</div><div class="panel-body">'+f.content+'</div>';d.onclick=()=>{speak(noEmoji(f.title)+'。'+noEmoji(f.content));learn(f.title)};box.appendChild(d)})}
}

function renderScience(tab,box){
  const src=SCIENCE[tab]||[];box.innerHTML='';
  src.forEach((item,i)=>{
    const name=tab==='common'?(lang==='en'?'Common Sense':item.q):(lang==='en'?(item.nameEn||item.name):item.name);
    const d=document.createElement('div');d.className='panel';d.style.animation='pop .4s ease '+(i*0.02)+'s backwards';
    let text=item.desc;if(tab==='common')text=item.a;
    d.innerHTML='<div class="panel-title">'+name+'</div><div class="panel-body">'+text+'</div>';
    d.onclick=()=>{speak(noEmoji(name)+'。'+noEmoji(text));learn(name)};box.appendChild(d)
  })
}
function renderGeo(tab,box){const src=GEO[tab]||[];box.innerHTML='';src.forEach((item,i)=>{const d=document.createElement('div');d.className='panel';d.style.animation='pop .4s ease '+(i*0.02)+'s backwards';d.innerHTML='<div class="panel-title">'+item.name+'</div><div class="panel-body">'+item.desc+'</div>';d.onclick=()=>{speak(noEmoji(item.name)+'。'+noEmoji(item.desc));learn(item.name)};box.appendChild(d)})}
function renderHistory(tab,box){const src=HISTORY[tab]||[];box.innerHTML='';src.forEach((item,i)=>{const d=document.createElement('div');d.className='panel';d.style.animation='pop .4s ease '+(i*0.02)+'s backwards';let txt=item.desc;if(item.period)txt=item.period+'\n'+txt;d.innerHTML='<div class="panel-title">'+item.name+' '+(item.period?'<span style="font-size:13px;color:#888">'+item.period+'</span>':'')+'</div><div class="panel-body" style="white-space:pre-line">'+txt+'</div>';d.onclick=()=>{speak(noEmoji(item.name)+'。'+noEmoji(item.desc));learn(item.name)};box.appendChild(d)})}
function renderSpace(tab,box){const src=SPACE[tab]||[];box.innerHTML='';src.forEach((item,i)=>{const d=document.createElement('div');d.className='panel';d.style.animation='pop .4s ease '+(i*0.02)+'s backwards';d.innerHTML='<div class="panel-title">'+item.name+'</div><div class="panel-body">'+item.desc+'</div>';d.onclick=()=>{speak(noEmoji(item.name)+'。'+noEmoji(item.desc));learn(item.name)};box.appendChild(d)})}


function showHistory(type){
  const o=getStats();const body=$('historyBody');body.innerHTML='';const isToday=type==='today';
  const list=isToday?o.todayList.slice().reverse():o.history.slice().reverse();
  $('historyTitle').textContent=isToday?(lang==='zh'?'今日已学内容':'Today Learned'):(lang==='zh'?'全部学习记录':'All History');
  if(list.length===0){body.innerHTML='<div style="text-align:center;color:#999;padding:20px;font-size:15px">'+(lang==='zh'?'还没有学习记录哦，快去探索吧！':'No records yet. Explore more!')+'</div>';}
  else{
    let lastDate='';
    list.forEach(item=>{
      if(!isToday&&item.date&&item.date!==lastDate){lastDate=item.date;const d=document.createElement('div');d.innerHTML='<div class="history-date">'+item.date+'</div>';body.appendChild(d);}
      const row=document.createElement('div');row.className='history-item';
      row.innerHTML='<span>'+item.t.replace(/</g,'&lt;')+'</span><time>'+(item.time||'')+'</time>';
      body.appendChild(row);
    });
  }
  $('historyModal').className='modal-overlay on';
}
function closeHistory(){$('historyModal').className='modal-overlay';}

buildMB();
renderHome();
if(!(navigator.language&&navigator.language.toLowerCase().startsWith('zh'))){lang='en';renderHome();}
updateStatsUI();
</script>
<div class="modal-overlay" id="historyModal" onclick="if(event.target===this)closeHistory()">
  <div class="modal-sheet">
    <div class="modal-head"><div class="modal-title" id="historyTitle">学习记录</div><button class="modal-close" onclick="closeHistory()">×</button></div>
    <div class="modal-body" id="historyBody"></div>
  </div>
</div>
